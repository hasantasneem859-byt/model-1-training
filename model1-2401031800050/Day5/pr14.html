<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Effect</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    /* First Section */
    .parallax{
      height: 100vh;
      background-image: url("pr14image.jpg");
      background-attachment: fixed;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .parallax h1{
      color: white;
      font-size: 60px;
      background: rgba(0,0,0,0.5);
      padding: 20px 40px;
      border-radius: 10px;
    }

    /* Content Section */
    .content{
      padding: 80px;
      background: white;
      text-align: center;
      line-height: 1.8;
    }

    .content h2{
      margin-bottom: 20px;
      font-size: 40px;
    }

    .content p{
      font-size: 20px;
      color: #444;
    }

    /* Second Parallax Section */
    .parallax2{
      height: 100vh;
      background-image: url("pr14image2.jpg");
      background-attachment: fixed;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .parallax2 h1{
      color: white;
      font-size: 60px;
      background: rgba(0,0,0,0.5);
      padding: 20px 40px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

  <!-- First Parallax -->
  <section class="parallax">
    <h1>PARALLAX EFFECT</h1>
  </section>

  <!-- Content -->
  <section class="content">
    <h2>About Parallax</h2>

    <p>
      Parallax effect is a scrolling effect where the background image
      moves slower than the foreground content. It creates a beautiful
      3D scrolling experience using HTML and CSS.
    </p>
  </section>

  <!-- Second Parallax -->
  <section class="parallax2">
    <h1>SCROLL DOWN</h1>
  </section>

</body>
</html>
