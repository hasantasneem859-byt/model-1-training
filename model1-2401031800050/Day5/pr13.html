<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Positioning Effect</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
    }

    /* Main Container */
    .video-box{
      width: 700px;
      height: 400px;
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    /* Video Styling */
    .video-box video{
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Text Overlay */
    .content{
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      background: rgba(0,0,0,0.5);
      padding: 20px 40px;
      border-radius: 10px;
    }

    .content h1{
      font-size: 40px;
      margin-bottom: 10px;
    }

    .content p{
      font-size: 18px;
    }

    /* Hover Effect */
    .video-box:hover{
      transform: scale(1.03);
      transition: 0.5s;
    }

  </style>
</head>

<body>

  <div class="video-box">

    <video autoplay muted loop>
      <source src="pr13video.mp4" type="video/mp4">
    </video>

    <div class="content">
      <h1>Welcome</h1>
      <p>Video Positioning Effect Using HTML & CSS</p>
    </div>

  </div>

</body>
</html>
