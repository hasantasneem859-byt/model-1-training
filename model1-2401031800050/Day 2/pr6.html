<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation Card</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    overflow-x:hidden;
    min-height:100vh;
    background:#111;
}

/* Background Video */
.video-bg{
    position:fixed;
    right:0;
    bottom:0;
    min-width:100%;
    min-height:100%;
    z-index:-1;
    object-fit:cover;
}

/* Main Card */
.card{
    width:90%;
    max-width:700px;
    margin:50px auto;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(8px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* Heading */
.card h1{
    font-size:50px;
    margin-bottom:10px;
    color:#ffd700;
}

.card h2{
    font-size:35px;
    margin-bottom:20px;
}

.card p{
    font-size:20px;
    line-height:35px;
}

/* Date Box */
.date-box{
    margin:25px 0;
    padding:15px;
    background:rgba(0,0,0,0.4);
    border-radius:10px;
    font-size:22px;
}

/* Map */
.map{
    margin-top:30px;
}

.map iframe{
    width:100%;
    height:300px;
    border-radius:15px;
    border:none;
}

.invite-photo{
    width:100%;
    max-height:auto;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.media-row{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
    margin-top:25px;
}

.media-item{
    flex:1 1 280px;
    background:rgba(255,255,255,0.15);
    padding:18px;
    border-radius:18px;
}

.media-item h3{
    font-size:18px;
    margin-bottom:12px;
    color:#ffd700;
}

.media-video,
.media-audio{
    width:100%;
    border-radius:12px;
}

/* Button */
.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#ff1493;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:20px;
    transition:0.3s;
}

.btn:hover{
    background:#ff69b4;
    transform:scale(1.05);
}

</style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop class="video-bg">
    <source src="pra6Video.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

<!-- Invitation Card -->
<div class="card">
    <img class="invite-photo" src="pra6Image.webp" alt="Invitation Photo">

   

    <div class="media-row">
        <div class="media-item">
            <h3>Invitation Video</h3>
            <video controls class="media-video">
                <source src="pra6Video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="media-item">
            <h3>Celebration Music</h3>
            <audio controls class="media-audio">
                <source src="pra6Audio.mp3" type="audio/mp3">
                Your browser does not support the audio tag.
            </audio>
        </div>
    </div>

    <!-- Google Map -->
    <div class="map">

        <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3719.5301460925246!2d72.8311!3d21.1702!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be04fdfc6b2d6ff%3A0x2f6c9b2b5d7f3d4a!2sSurat%2C%20Gujarat!5e0!3m2!1sen!2sin!4v1715670000000!5m2!1sen!2sin"
        allowfullscreen=""
        loading="lazy">
        </iframe>

    </div>

    <a href="#" class="btn">Join Us</a>

</div>

</body>
</html>
