<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Registration Form</title>

    <style>

        /* Animated Background */
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;

           

           
        }

        /* Background Animation */
        @keyframes bgAnimation{

            0%{
                background-position:left;
            }

            50%{
                background-position:center;
            }

            100%{
                background-position:right;
            }
        }

        /* Main Form Box */
        .main{
            width:850px;
            margin:40px auto;
            background-color:rgba(255,255,255,0.9);
            border:4px solid #556b2f;
            border-radius:20px;
            padding:25px;

            animation: formMove 2s ease;
        }

        /* Form Animation */
        @keyframes formMove{

            from{
                transform:translateY(-50px);
                opacity:0;
            }

            to{
                transform:translateY(0px);
                opacity:1;
            }
        }

        /* Logo */
        .logo{
            text-align:center;
            margin-bottom:10px;
        }

        /* Only Image Attach */
        .logo img{
            width:120px;
            height:120px;
            border-radius:15px;
            border:3px solid black;
        }

        /* Heading */
        .title{
            text-align:center;
            font-size:40px;
            font-weight:bold;
            color:darkgreen;
            margin-bottom:20px;
            text-shadow:2px 2px 5px gray;
        }

        /* Table */
        table{
            width:100%;
            border-collapse:collapse;
        }

        td{
            border:1px solid #7d8d57;
            padding:12px;
            font-size:18px;
        }

        .label{
            width:35%;
            font-weight:bold;
            background-color:#dce8b5;
        }

        /* Input Fields */
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        input[type="tel"],
        textarea,
        select{

            width:95%;
            padding:10px;
            font-size:16px;
            border:2px solid gray;
            border-radius:8px;
            background-color:#f9f9f9;

            transition:0.5s;
        }

        /* Focus Effect */
        input:focus,
        textarea:focus,
        select:focus{

            border-color:blue;
            background-color:#e6f0ff;
            outline:none;

            transform:scale(1.02);
        }

        textarea{
            height:90px;
            resize:none;
        }

        .radio{
            width:auto;
        }

        /* Buttons */
        .btn{
            background-color:darkblue;
            color:white;
            border:none;
            padding:10px 20px;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;

            transition:0.5s;
        }

        .btn:hover{

            background-color:green;

            transform:scale(1.1);
        }
        
        #bg{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height: 100%;
            object-fit: cover;
            z-index:-1;            
        }

    </style>
</head>

   <body>

    <div class="main">

        <!-- Logo -->
        <div class="logo">

            <img src="https://silveroakuni.ac.in/assets/images/logo/sou-l.svg">

        </div>

        <!-- Heading -->
        <div class="title">
            Registration Form
        </div>

    <video autoplay muted loop playsinline id="bg">
        <source src="day 2/v.mp4" type="video/mp4">
    </video>

        <!-- Form -->
        <form>

            <table>

                <tr>
                    <td class="label">First Name</td>

                    <td>
                        <input type="text"
                        placeholder="Enter First Name"
                        required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Last Name</td>

                    <td>
                        <input type="text"
                        placeholder="Enter Last Name"
                        required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Mobile Number</td>

                    <td>
                        <input type="tel"
                        placeholder="Enter 10 Digit Number"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Email ID</td>

                    <td>
                        <input type="email"
                        placeholder="Enter Email ID"
                        required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Password</td>

                    <td>
                        <input type="password"
                        placeholder="Enter Password"
                        required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Date of Birth</td>

                    <td>
                        <input type="date" required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Age</td>

                    <td>
                        <input type="text"
                        placeholder="Enter Age"
                        required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Gender</td>

                    <td>
                        Male
                        <input class="radio"
                        type="radio"
                        name="gender"
                        required>

                        Female
                        <input class="radio"
                        type="radio"
                        name="gender">
                    </td>
                </tr>

                <tr>
                    <td class="label">Address</td>

                    <td>
                        <textarea required></textarea>
                    </td>
                </tr>

                <tr>
                    <td class="label">City</td>

                    <td>
                        <select required>

                            <option value="">
                                Select City
                            </option>

                            <option>
                                Ahmedabad
                            </option>

                            <option>
                                Surat
                            </option>

                            <option>
                                Vadodara
                            </option>

                            <option>
                                Rajkot
                            </option>

                        </select>
                    </td>
                </tr>

                <tr>
                    <td class="label">Pincode</td>

                    <td>
                        <input type="text"
                        placeholder="Enter Pincode"
                        maxlength="6"
                        pattern="[0-9]{6}"
                        required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Country</td>

                    <td>
                        <input type="text"
                        value="India"
                        readonly>
                    </td>
                </tr>

                <tr>
                    <td class="label">Course</td>

                    <td>

                        <select required>

                            <option value="">
                                Choose Course
                            </option>

                            <option>BCA</option>

                            <option>B.Tech</option>

                            <option>B.Sc</option>

                            <option>MCA</option>

                        </select>

                    </td>
                </tr>

                <tr>

                    <td colspan="2" align="center">

                        <input class="btn"
                        type="submit"
                        value="Submit">

                        <input class="btn"
                        type="reset"
                        value="Reset">

                    </td>

                </tr>

            </table>

        </form>

    </div>

</body>
</html>
