<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Registration Form</title>

    <style>

        body{
            background-color:#dcdcdc;
            font-family: Arial, sans-serif;
        }

        .main{
            width: 850px;
            margin: 30px auto;
            border: 4px solid #556b2f;
            background-color:#b7c78a;
            padding:20px;
        }

        .title{
            text-align:center;
            font-size:40px;
            font-weight:bold;
            color:#2f3e1f;
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        td{
            border:1px solid #7d8d57;
            padding:10px;
            font-size:18px;
        }

        .label{
            width:35%;
            font-weight:bold;
            color:#2f2f2f;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        input[type="tel"],
        textarea,
        select{
            width:95%;
            padding:8px;
            border:2px solid gray;
            font-size:16px;
            background-color:white;
        }

        textarea{
            height:90px;
            resize:none;
        }

        .radio{
            width:auto;
        }

        .btn{
            background-color:#f0f0f0;
            border:2px solid black;
            padding:8px 18px;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background-color:green;
            color:white;
        }

    </style>
</head>

<body>

    <div class="main">

        <div class="title">
            Registration Form
        </div>

        <form>

            <table>

                <tr>
                    <td class="label">First Name</td>
                    <td>
                        <input type="text" placeholder="Enter First Name" required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Last Name</td>
                    <td>
                        <input type="text" placeholder="Enter Last Name" required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Contact no</td>
                    <td>
                        <input type="tel"
                        placeholder="Enter Your Mobile No"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Email ID</td>
                    <td>
                        <input type="email" placeholder="Enter Your Email ID" required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Password</td>
                    <td>
                        <input type="password" placeholder="Enter New Password" required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Date of Birth</td>
                    <td>
                        <input type="date" required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Age</td>
                    <td>
                        <input type="text" placeholder="Enter Age" required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Gender</td>
                    <td>
                        Male
                        <input class="radio" type="radio" name="gender" required>

                        Female
                        <input class="radio" type="radio" name="gender">
                    </td>
                </tr>

                <tr>
                    <td class="label">Address</td>
                    <td>
                        <textarea required></textarea>
                    </td>
                </tr>

                <tr>
                    <td class="label">City</td>
                    <td>
                        <select required>
                            <option value="">Select City</option>
                            <option>Ahmedabad</option>
                            <option>Surat</option>
                            <option>Vadodara</option>
                            <option>Rajkot</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td class="label">Pincode</td>
                    <td>
                        <input type="text"
                        placeholder="Enter Pincode"
                        maxlength="6"
                        pattern="[0-9]{6}"
                        required>
                    </td>
                </tr>

                <tr>
                    <td class="label">Country</td>
                    <td>
                        <input type="text" value="India" readonly>
                    </td>
                </tr>

                <tr>
                    <td class="label">Course</td>
                    <td>
                        <select required>
                            <option value="">Choose Your Course</option>
                            <option>BCA</option>
                            <option>B.Tech</option>
                            <option>B.Sc</option>
                            <option>MCA</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">

                        <input class="btn" type="submit" value="Submit">

                        <input class="btn" type="reset" value="Reset">

                    </td>
                </tr>

            </table>

        </form>

    </div>

</body>
</html>
