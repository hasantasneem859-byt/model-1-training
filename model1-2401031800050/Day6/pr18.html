<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registration Form</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        /* Navbar */

        .navbar{
            background-color: #0d6efd;
        }

        .navbar-brand,
        .nav-link{
            color: white !important;
            font-weight: bold;
        }

        .nav-link:hover{
            color: yellow !important;
        }

        /* Hero Section */

        .home{

            height: 500px;

            background-image: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085');

            background-size: cover;

            background-position: center;

            background-repeat: no-repeat;

            display: flex;

            justify-content: center;

            align-items: center;

            text-align: center;

            color: white;

            position: relative;
        }

        /* Dark Overlay */

        .home::before{

            content: "";

            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0.5);
        }

        /* Text Above Overlay */

        .home div{

            position: relative;

            z-index: 1;
        }

        .home h1{
            font-size: 60px;
            font-weight: bold;
        }

        .home p{
            font-size: 25px;
        }

        /* Form Box */

        .form-box{

            background: white;

            padding: 30px;

            border-radius: 15px;

            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        /* Gallery Images */

        .gallery img{

            width: 100%;

            height: 310px;

            object-fit: cover;

            border-radius: 15px;

            transition: 0.3s;

            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        .gallery img:hover{

            transform: scale(1.03);
        }

        /* Contact Box */

        .contact-box{

            background: white;

            padding: 25px;

            border-radius: 15px;

            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        /* Footer */

        footer{

            background-color: #0d6efd;

            color: white;

            text-align: center;

            padding: 15px;

            margin-top: 40px;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand" href="#">
                My Website
            </a>

            <button class="navbar-toggler bg-light"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                 id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="#home">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#registration">
                            Registration
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#login">
                            Login
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#gallery">
                            Gallery
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#contact">
                            Contact
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>


    <!-- Home Section -->

    <section class="home"
             id="home">

        <div>

            <h1>
                Welcome To My Website
            </h1>

            <p>
                Create your account here
            </p>

        </div>

    </section>


    <!-- Registration Form -->

    <div class="container mt-5"
         id="registration">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="form-box">

                    <h2 class="text-center text-primary mb-4">
                        Registration Form
                    </h2>

                    <form>

                        <!-- Name -->

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Enter Your Name"
                                   required>

                        </div>


                        <!-- Email -->

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="you@example.com"
                                   required>

                        </div>


                        <!-- Mobile -->

                        <div class="mb-3">

                            <label class="form-label">
                                Mobile Number
                            </label>

                            <input type="tel"
                                   class="form-control"
                                   placeholder="Enter 10 digit number"
                                   maxlength="10"
                                   pattern="[0-9]{10}"
                                   required>

                        </div>


                        <!-- Gender -->

                        <div class="mb-3">

                            <label class="form-label">
                                Gender
                            </label>

                            <br>

                            <div class="form-check form-check-inline">

                                <input type="radio"
                                       class="form-check-input"
                                       name="gender"
                                       required>

                                <label class="form-check-label">
                                    Male
                                </label>

                            </div>

                            <div class="form-check form-check-inline">

                                <input type="radio"
                                       class="form-check-input"
                                       name="gender">

                                <label class="form-check-label">
                                    Female
                                </label>

                            </div>

                        </div>


                        <!-- Password -->

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Minimum 8 characters"
                                   minlength="8"
                                   required>

                        </div>


                        <!-- Terms -->

                        <div class="mb-3 form-check">

                            <input type="checkbox"
                                   class="form-check-input"
                                   required>

                            <label class="form-check-label">
                                I agree to Terms & Conditions
                            </label>

                        </div>


                        <!-- Button -->

                        <button class="btn btn-success w-100">

                            Register

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>


    <!-- Login Section -->

    <div class="container mt-5"
         id="login">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="form-box">

                    <h2 class="text-center text-success mb-4">
                        Login Form
                    </h2>

                    <form>

                        <div class="mb-3">

                            <label>
                                Email
                            </label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="Enter Email">

                        </div>

                        <div class="mb-3">

                            <label>
                                Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Enter Password">

                        </div>

                        <button class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>


    <!-- Gallery Section -->

    <div class="container mt-5"
         id="gallery">

        <h2 class="text-center text-primary mb-4">
            Gallery
        </h2>

        <div class="row g-4 gallery">

            <!-- Image 1 -->

            <div class="col-md-4">

                <img src="https://picsum.photos/id/1011/600/400"
                     class="img-fluid shadow">

            </div>


            <!-- Image 2 -->

            <div class="col-md-4">

                <img src="https://picsum.photos/id/1015/600/400"
                     class="img-fluid shadow">

            </div>


            <!-- Image 3 -->

            <div class="col-md-4">

                <img src="https://picsum.photos/id/1016/600/400"
                     class="img-fluid shadow">

            </div>


            <!-- Image 4 -->

            <div class="col-md-4">

                <img src="https://picsum.photos/id/1025/600/400"
                     class="img-fluid shadow">

            </div>


            <!-- Image 5 -->

            <div class="col-md-4">

                <img src="https://picsum.photos/id/1035/600/400"
                     class="img-fluid shadow">

            </div>


            <!-- Image 6 -->

            <div class="col-md-4">

                <img src="https://picsum.photos/id/1043/600/400"
                     class="img-fluid shadow">

            </div>

        </div>

    </div>


    <!-- Contact Section -->

    <div class="container mt-5 mb-5"
         id="contact">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="contact-box">

                    <h2 class="text-center text-danger mb-4">
                        Contact Us
                    </h2>

                    <p>
                        <b>Address:</b>
                        Ahmedabad, Gujarat
                    </p>

                    <p>
                        <b>Email:</b>
                        example@gmail.com
                    </p>

                    <p>
                        <b>Phone:</b>
                        +91 9876543210
                    </p>


                    <!-- Google Map -->

                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d117440.03917623972!2d72.49075790344597!3d23.020474100610444!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e84f51cda7b33%3A0x63d1bfa8b5d4d0f6!2sAhmedabad%2C%20Gujarat!5e0!3m2!1sen!2sin!4v1750000000000!5m2!1sen!2sin"
                        width="100%"
                        height="250"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy">

                    </iframe>

                </div>

            </div>

        </div>

    </div>


    <!-- Footer -->

    <footer>

        <p>
            © 2026 My Website | All Rights Reserved
        </p>

    </footer>


    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
